apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeplus-hello-world-consumer
  namespace: argocd
spec:
  project: kubeplus-tenants
  source:
    repoURL: https://github.com/PatrickBladeeman/kubeplus-examples
    targetRevision: main
    path: multitenancy/application-hosting/hello-world-argocd/tenants
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
